<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c10">
<title>給与明細</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;
  background:#0a0c10;color:#f5f7fa;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ===== レイアウト ===== */
#app{padding-bottom:calc(64px + env(safe-area-inset-bottom))}
.view{display:none}
.view.active{display:block;animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== ヘッダー（ラージタイトル + すりガラス） ===== */
.hdr{position:sticky;top:0;z-index:30;
  padding:calc(env(safe-area-inset-top) + 8px) 20px 10px;
  background:rgba(10,12,16,.72);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid rgba(255,255,255,.07);
}
.hdr-row{display:flex;align-items:flex-end;justify-content:space-between}
.hdr h1{font-size:30px;font-weight:700;letter-spacing:-.6px}
.hdr-sub{font-size:13px;color:#8b94a7;margin-top:3px}
.icon-btn{width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);color:#f5f7fa}
.icon-btn:active{background:rgba(255,255,255,.18)}
.icon-btn svg{width:19px;height:19px}

/* ===== 明細リスト ===== */
.wrap{padding:16px 16px 24px}

/* ヒーロー（直近の手取り） */
.hero{
  background:linear-gradient(160deg,#161c27 0%,#11151d 100%);
  border:.5px solid rgba(255,255,255,.08);
  border-radius:22px;padding:20px 20px 18px;margin-bottom:18px;
  box-shadow:0 14px 30px -18px rgba(0,0,0,.8);
}
.hero-label{font-size:13px;color:#8b94a7;font-weight:500}
.hero-amt{font-size:42px;font-weight:700;letter-spacing:-1.5px;margin-top:4px;line-height:1}
.hero-amt .yen{font-size:24px;font-weight:600;color:#9aa3b2;margin-right:2px}
.hero-meta{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:13px;font-weight:600;
  padding:4px 9px;border-radius:20px}
.delta.up{color:#3dd7c9;background:rgba(61,215,201,.13)}
.delta.down{color:#ff6b81;background:rgba(255,107,129,.13)}
.delta.flat{color:#8b94a7;background:rgba(255,255,255,.06)}
.delta svg{width:12px;height:12px}
.hero-month{font-size:13px;color:#8b94a7}

.sec-title{font-size:13px;color:#8b94a7;font-weight:600;margin:6px 4px 10px;letter-spacing:.2px}

/* リスト行 */
.list{display:flex;flex-direction:column;gap:10px}
.row{
  display:flex;align-items:center;gap:14px;
  background:#14171f;border:.5px solid rgba(255,255,255,.06);
  border-radius:16px;padding:14px 16px;
  transition:transform .12s ease,background .12s ease;
}
.row:active{transform:scale(.985);background:#181c25}
.row-ym{flex:0 0 auto;text-align:center;min-width:50px}
.row-ym .y{font-size:11px;color:#8b94a7;font-weight:600}
.row-ym .m{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.05}
.row-ym .m .u{font-size:12px;font-weight:600;color:#8b94a7;margin-left:1px}
.row-bar{width:.5px;height:34px;background:rgba(255,255,255,.1)}
.row-main{flex:1;min-width:0}
.row-co{font-size:12.5px;color:#8b94a7;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-net{font-size:21px;font-weight:700;letter-spacing:-.5px}
.row-net .yen{font-size:14px;font-weight:600;color:#9aa3b2;margin-right:1px}
.row-side{flex:0 0 auto;text-align:right}
.row-side .lbl{font-size:10.5px;color:#6b7385}
.row-side .v{font-size:14px;font-weight:600;color:#c2cad8}
.chev{flex:0 0 auto;color:#4b5366}
.chev svg{width:16px;height:16px}

/* 空状態 */
.empty{text-align:center;padding:64px 30px;color:#8b94a7}
.empty .e-ic{width:62px;height:62px;border-radius:18px;margin:0 auto 16px;
  background:rgba(61,215,201,.12);display:flex;align-items:center;justify-content:center}
.empty .e-ic svg{width:30px;height:30px;color:#3dd7c9}
.empty h3{font-size:18px;font-weight:600;color:#f5f7fa;margin-bottom:6px}
.empty p{font-size:14px;line-height:1.5}
.empty .cta{margin-top:20px;display:inline-block;
  background:linear-gradient(120deg,#3dd7c9,#3b82f6);color:#06121a;
  font-weight:700;font-size:15px;padding:12px 24px;border-radius:30px}

/* ===== 推移グラフ ===== */
.seg{display:flex;background:rgba(255,255,255,.06);border-radius:11px;padding:3px;margin:0 0 18px}
.seg button{flex:1;font-size:13.5px;font-weight:600;color:#9aa3b2;
  padding:8px 0;border-radius:8px;transition:.18s}
.seg button.on{background:#2a3140;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.4)}

.chart-card{
  background:#12151d;border:.5px solid rgba(255,255,255,.06);
  border-radius:22px;padding:20px 8px 14px;margin-bottom:18px;position:relative;
}
.chart-head{padding:0 14px 6px}
.chart-cur-lbl{font-size:12.5px;color:#8b94a7;font-weight:500}
.chart-cur-val{font-size:34px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.chart-cur-val .yen{font-size:20px;color:#9aa3b2;margin-right:1px}
.chart-cur-month{font-size:12.5px;color:#3dd7c9;font-weight:600;margin-top:1px;height:16px}
.chart-box{position:relative;width:100%;touch-action:pan-y}
.chart-box svg{display:block;width:100%;height:230px}
.scrub-line{position:absolute;top:8px;width:1px;background:rgba(61,215,201,.55);
  pointer-events:none;opacity:0;transition:opacity .15s}
.x-labels{display:flex;justify-content:space-between;padding:6px 16px 0;
  font-size:11px;color:#6b7385}

/* 統計タイル */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#14171f;border:.5px solid rgba(255,255,255,.06);
  border-radius:16px;padding:14px 16px}
.stat .lbl{font-size:12px;color:#8b94a7;font-weight:500}
.stat .v{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-top:3px}
.stat .v .yen{font-size:13px;color:#9aa3b2;margin-right:1px}

/* ===== 年度別 ===== */
.year-card{background:#14171f;border:.5px solid rgba(255,255,255,.06);
  border-radius:18px;padding:16px 18px;margin-bottom:12px}
.year-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.year-name{font-size:19px;font-weight:700;letter-spacing:-.3px}
.year-range{font-size:11.5px;color:#6b7385;margin-top:1px}
.year-count{font-size:12px;color:#8b94a7;font-weight:500}
.year-net{margin-bottom:12px}
.year-net .lbl{font-size:12px;color:#8b94a7}
.year-net .v{font-size:30px;font-weight:700;letter-spacing:-1px;
  background:linear-gradient(120deg,#3dd7c9,#5aa9ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.year-net .v .yen{font-size:18px}
.year-sub{display:flex;gap:18px}
.year-sub .it{flex:1}
.year-sub .it .lbl{font-size:11.5px;color:#8b94a7}
.year-sub .it .v{font-size:16px;font-weight:600;color:#c2cad8;margin-top:1px}
.year-sub .it .v .yen{font-size:11px;color:#8b94a7;margin-right:1px}

/* ===== タブバー ===== */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;
  display:flex;
  padding:8px 0 calc(env(safe-area-inset-bottom) + 6px);
  background:rgba(10,12,16,.8);
  -webkit-backdrop-filter:saturate(180%) blur(22px);
  backdrop-filter:saturate(180%) blur(22px);
  border-top:.5px solid rgba(255,255,255,.08);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:#6b7385}
.tab.on{color:#3dd7c9}
.tab svg{width:25px;height:25px}
.tab span{font-size:10px;font-weight:600;letter-spacing:.2px}
.tab:active{opacity:.6}

/* FAB（追加） */
.fab{position:fixed;right:18px;bottom:calc(74px + env(safe-area-inset-bottom));z-index:35;
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,#3dd7c9,#3b82f6);
  box-shadow:0 10px 26px -6px rgba(59,130,246,.55);
  display:flex;align-items:center;justify-content:center;color:#06121a;
  transition:transform .15s}
.fab:active{transform:scale(.9)}
.fab svg{width:28px;height:28px}

/* ===== シート（スライドアップ） ===== */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .3s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:#15181f;border-radius:22px 22px 0 0;
  transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);
  max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(env(safe-area-inset-bottom) + 16px);
  box-shadow:0 -10px 40px rgba(0,0,0,.5);
}
.sheet.show{transform:translateY(0)}
.grab{width:38px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);
  margin:9px auto 4px}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;
  padding:8px 18px 14px;position:sticky;top:0;background:#15181f;z-index:2}
.sheet-hd h2{font-size:18px;font-weight:700}
.sheet-hd .x{font-size:16px;color:#3dd7c9;font-weight:600}
.sheet-hd .x.del{color:#ff6b81}
.form{padding:0 18px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#8b94a7;font-weight:600;margin-bottom:7px;padding-left:2px}
.field input{width:100%;font-size:17px;color:#f5f7fa;
  background:#0f1218;border:.5px solid rgba(255,255,255,.1);
  border-radius:13px;padding:14px 15px;outline:none;transition:border .15s}
.field input:focus{border-color:#3dd7c9}
.field input::placeholder{color:#4b5366}
.amt-input{position:relative}
.amt-input .pre{position:absolute;left:15px;top:50%;transform:translateY(-50%);
  font-size:17px;color:#6b7385;pointer-events:none}
.amt-input input{padding-left:30px;font-weight:600;font-variant-numeric:tabular-nums}
.hint{font-size:12px;color:#6b7385;margin-top:6px;padding-left:2px}
.hint b{color:#3dd7c9;font-weight:600}

.btn-row{display:flex;gap:10px;margin-top:8px}
.btn{flex:1;text-align:center;font-size:16px;font-weight:700;
  padding:15px;border-radius:14px}
.btn-primary{background:linear-gradient(120deg,#3dd7c9,#3b82f6);color:#06121a}
.btn-primary:active{opacity:.85}
.btn-ghost{background:rgba(255,255,255,.07);color:#f5f7fa}

/* スキャンの選択肢 */
.scan-opts{display:flex;flex-direction:column;gap:11px;margin:4px 0 18px}
.scan-opt{display:flex;align-items:center;gap:14px;
  background:#0f1218;border:.5px solid rgba(255,255,255,.1);
  border-radius:15px;padding:15px 16px;text-align:left}
.scan-opt:active{background:#12161e}
.scan-opt .so-ic{width:42px;height:42px;border-radius:12px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center}
.scan-opt .so-ic.cam{background:rgba(61,215,201,.14);color:#3dd7c9}
.scan-opt .so-ic.pen{background:rgba(90,169,255,.14);color:#5aa9ff}
.scan-opt .so-ic svg{width:22px;height:22px}
.scan-opt .so-tx .t{font-size:16px;font-weight:600}
.scan-opt .so-tx .d{font-size:12.5px;color:#8b94a7;margin-top:1px}
.scan-opt .so-chev{margin-left:auto;color:#4b5366}
.scan-opt .so-chev svg{width:17px;height:17px}

/* OCR進捗 */
.ocr-overlay{position:fixed;inset:0;z-index:80;
  background:rgba(8,10,14,.86);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px}
.ocr-overlay.show{display:flex}
.spinner{width:54px;height:54px;border-radius:50%;
  border:4px solid rgba(61,215,201,.2);border-top-color:#3dd7c9;
  animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-overlay .ot{font-size:16px;font-weight:600}
.ocr-overlay .od{font-size:13px;color:#8b94a7;text-align:center;line-height:1.5;max-width:260px}
.ocr-bar{width:200px;height:6px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden}
.ocr-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#3dd7c9,#3b82f6);transition:width .25s}

/* トースト */
.toast{position:fixed;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px);z-index:90;
  background:rgba(40,46,58,.96);color:#fff;font-size:14px;font-weight:500;
  padding:12px 20px;border-radius:30px;opacity:0;pointer-events:none;
  transition:.3s;border:.5px solid rgba(255,255,255,.1)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 設定リスト */
.set-list{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,.06);
  border-radius:14px;overflow:hidden;margin-bottom:18px}
.set-item{display:flex;align-items:center;gap:13px;background:#14171f;padding:15px 16px}
.set-item:active{background:#1a1e28}
.set-item .si-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.set-item .si-ic svg{width:18px;height:18px}
.set-item .si-t{font-size:16px;font-weight:500;flex:1}
.set-item.danger .si-t{color:#ff6b81}
.set-item .si-chev{color:#4b5366}
.set-item .si-chev svg{width:16px;height:16px}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<div id="app">

  <!-- ========== 明細 ========== -->
  <section class="view active" id="v-list">
    <header class="hdr">
      <div class="hdr-row">
        <div>
          <h1>給与明細</h1>
          <div class="hdr-sub" id="list-sub">記録なし</div>
        </div>
        <button class="icon-btn" id="settings-btn" aria-label="設定">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
        </button>
      </div>
    </header>
    <div class="wrap" id="list-body"></div>
  </section>

  <!-- ========== 推移 ========== -->
  <section class="view" id="v-trend">
    <header class="hdr">
      <div class="hdr-row"><div><h1>推移</h1><div class="hdr-sub" id="trend-sub">月ごとの変化</div></div></div>
    </header>
    <div class="wrap" id="trend-body"></div>
  </section>

  <!-- ========== 年度別 ========== -->
  <section class="view" id="v-year">
    <header class="hdr">
      <div class="hdr-row"><div><h1>年度別</h1><div class="hdr-sub" id="year-sub">合計と内訳</div></div></div>
    </header>
    <div class="wrap" id="year-body"></div>
  </section>

</div>

<!-- FAB -->
<button class="fab" id="fab" aria-label="明細を追加">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- タブバー -->
<nav class="tabbar">
  <button class="tab on" data-tab="list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
    <span>明細</span>
  </button>
  <button class="tab" data-tab="trend">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-6 4 3 5-7 4 4"/></svg>
    <span>推移</span>
  </button>
  <button class="tab" data-tab="year">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2.5"/><path d="M4 10h16M9 3v4M15 3v4"/></svg>
    <span>年度</span>
  </button>
</nav>

<!-- スクリム -->
<div class="scrim" id="scrim"></div>

<!-- 追加メニューシート -->
<div class="sheet" id="sheet-add">
  <div class="grab"></div>
  <div class="sheet-hd"><h2>明細を追加</h2><button class="x" data-close>閉じる</button></div>
  <div class="form">
    <div class="scan-opts">
      <button class="scan-opt" id="opt-scan">
        <span class="so-ic cam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h3l1.5-2h9L18 7h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.6"/></svg></span>
        <span class="so-tx"><span class="t">スキャンで読み取り</span><span class="d">明細を撮影・選択して自動入力</span></span>
        <span class="so-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </button>
      <button class="scan-opt" id="opt-manual">
        <span class="so-ic pen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span>
        <span class="so-tx"><span class="t">手入力</span><span class="d">金額を直接入力する</span></span>
        <span class="so-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </button>
    </div>
  </div>
</div>

<!-- 入力フォームシート -->
<div class="sheet" id="sheet-form">
  <div class="grab"></div>
  <div class="sheet-hd">
    <button class="x" id="form-cancel">キャンセル</button>
    <h2 id="form-title">明細</h2>
    <button class="x del" id="form-delete" style="display:none">削除</button>
    <span id="form-spacer" style="width:54px"></span>
  </div>
  <div class="form">
    <div class="field">
      <label>年月</label>
      <input type="month" id="f-ym">
    </div>
    <div class="field">
      <label>会社名（任意）</label>
      <input type="text" id="f-co" placeholder="例）〇〇建設" autocomplete="off">
    </div>
    <div class="field">
      <label>総支給額</label>
      <div class="amt-input"><span class="pre">¥</span><input type="text" inputmode="numeric" id="f-gross" placeholder="0"></div>
    </div>
    <div class="field">
      <label>控除額</label>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
/* =========================================================
   給与明細 — 単一HTML / localStorage
   ========================================================= */
const KEY='kyuyo_v1';
let DATA=[];          // {id, ym:'YYYY-MM', co, gross, ded, net, memo}
let editingId=null;
let metric='net';     // net | gross | ded
let yearMode='nendo'; // nendo(4月始まり) | calendar

/* ---- 保存・読込 ---- */
function load(){ try{DATA=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){DATA=[]} }
function save(){ localStorage.setItem(KEY,JSON.stringify(DATA)) }

/* ---- 整形 ---- */
const yen = n => '¥'+Math.round(n||0).toLocaleString('ja-JP');
const yenParts = n => ({yen:'¥', num:Math.round(n||0).toLocaleString('ja-JP')});
const sorted = () => [...DATA].sort((a,b)=> a.ym<b.ym?-1:a.ym>b.ym?1:0);
const metricLabel = {net:'手取り', gross:'総支給', ded:'控除'};
const val = (d,m)=> (m==='net'?d.net : m==='gross'?d.gross : d.ded) || 0;

/* 年度キー：nendo=4月始まり / calendar=暦年 */
function yearKeyOf(ym){
  const [y,m]=ym.split('-').map(Number);
  if(yearMode==='calendar') return String(y);
  return String(m<=3 ? y-1 : y);
}
function yearTitle(key){
  if(yearMode==='calendar') return key+'年';
  return key+'年度';
}
function yearRange(key){
  if(yearMode==='calendar') return key+'/1 〜 '+key+'/12';
  const k=Number(key); return key+'/4 〜 '+(k+1)+'/3';
}

/* =========================================================
   描画
   ========================================================= */
function render(){ renderList(); renderTrend(); renderYear(); }

/* ---- 明細リスト ---- */
function renderList(){
  const body=document.getElementById('list-body');
  const sub=document.getElementById('list-sub');
  const items=sorted();
  if(items.length===0){
    sub.textContent='記録なし';
    body.innerHTML=`<div class="empty">
      <div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 13h6M9 17h4M8 3h8a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M9 7h6"/></svg></div>
      <h3>まだ明細がありません</h3>
      <p>「＋」から給与明細を追加しましょう。<br>スキャンか手入力で記録できます。</p>
      <span class="cta" id="empty-add">明細を追加</span>
    </div>`;
    document.getElementById('empty-add').onclick=openAdd;
    return;
  }
  const latest=items[items.length-1];
  const prev=items.length>1?items[items.length-2]:null;
  sub.textContent=items.length+'件の記録';

  // ヒーロー
  let delta='';
  if(prev){
    const d=val(latest,'net')-val(prev,'net');
    const cls=d>0?'up':d<0?'down':'flat';
    const arrow=d>0?'M12 5v14M6 11l6-6 6 6':d<0?'M12 19V5M6 13l6 6 6-6':'M5 12h14';
    delta=`<span class="delta ${cls}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="${arrow}"/></svg>${d===0?'前月と同じ':yen(Math.abs(d))}</span>`;
  }
  const lp=yenParts(val(latest,'net'));
  const [ly,lm]=latest.ym.split('-');
  const hero=`<div class="hero">
    <div class="hero-label">直近の手取り</div>
    <div class="hero-amt tnum"><span class="yen">${lp.yen}</span>${lp.num}</div>
    <div class="hero-meta">${delta}<span class="hero-month">${ly}年${Number(lm)}月${latest.co?'・'+esc(latest.co):''}</span></div>
  </div>`;

  // リスト（新しい順）
  const rows=[...items].reverse().map(d=>{
    const [y,m]=d.ym.split('-');
    const np=yenParts(val(d,'net'));
    return `<div class="row" data-id="${d.id}">
      <div class="row-ym"><div class="y">${y}</div><div class="m tnum">${Number(m)}<span class="u">月</span></div></div>
      <div class="row-bar"></div>
      <div class="row-main">
        ${d.co?`<div class="row-co">${esc(d.co)}</div>`:`<div class="row-co">手取り</div>`}
        <div class="row-net tnum"><span class="yen">${np.yen}</span>${np.num}</div>
      </div>
      <div class="row-side">
        <div class="lbl">総支給</div>
        <div class="v tnum">${val(d,'gross')?yen(val(d,'gross')):'—'}</div>
      </div>
      <div class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>
    </div>`;
  }).join('');

  body.innerHTML=hero+`<div class="sec-title">すべての記録</div><div class="list">${rows}</div>`;
  body.querySelectorAll('.row').forEach(r=> r.onclick=()=>openEdit(r.dataset.id));
}

/* ---- 推移グラフ ---- */
function renderTrend(){
  const body=document.getElementById('trend-body');
  const items=sorted();
  const seg=`<div class="seg">
    ${['net','gross','ded'].map(m=>`<button data-m="${m}" class="${m===metric?'on':''}">${metricLabel[m]}</button>`).join('')}
  </div>`;

  if(items.length===0){
    body.innerHTML=seg+`<div class="empty"><div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-6 4 3 5-7 4 4"/></svg></div><h3>データがありません</h3><p>明細を追加すると、ここに推移が表示されます。</p></div>`;
    bindSeg(); return;
  }

  const series=items.map(d=>({ym:d.ym, v:val(d,metric)}));
  const vals=series.map(s=>s.v);
  const sum=vals.reduce((a,b)=>a+b,0);
  const avg=sum/vals.length;
  const max=Math.max(...vals), min=Math.min(...vals);

  const cur=series[series.length-1];
  const cp=yenParts(cur.v);
  const [cy,cm]=cur.ym.split('-');

  body.innerHTML=seg+`
    <div class="chart-card">
      <div class="chart-head">
        <div class="chart-cur-lbl">最新の${metricLabel[metric]}</div>
        <div class="chart-cur-val tnum" id="cur-val"><span class="yen">${cp.yen}</span>${cp.num}</div>
        <div class="chart-cur-month" id="cur-month">${cy}年${Number(cm)}月</div>
      </div>
      <div class="chart-box" id="chart-box">
        <div class="scrub-line" id="scrub"></div>
      </div>
      <div class="x-labels" id="xlabels"></div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="lbl">平均</div><div class="v tnum"><span class="yen">¥</span>${Math.round(avg).toLocaleString('ja-JP')}</div></div>
      <div class="stat"><div class="lbl">合計（全期間）</div><div class="v tnum"><span class="yen">¥</span>${sum.toLocaleString('ja-JP')}</div></div>
      <div class="stat"><div class="lbl">最高</div><div class="v tnum"><span class="yen">¥</span>${max.toLocaleString('ja-JP')}</div></div>
      <div class="stat"><div class="lbl">最低</div><div class="v tnum"><span class="yen">¥</span>${min.toLocaleString('ja-JP')}</div></div>
    </div>`;

  bindSeg();
  drawChart(series);
}

function bindSeg(){
  document.querySelectorAll('.seg button').forEach(b=>{
    b.onclick=()=>{ metric=b.dataset.m; renderTrend(); };
  });
}

/* SVG折れ線（なめらか曲線 + グラデーション + スクラブ） */
function drawChart(series){
  const box=document.getElementById('chart-box');
  if(!box) return;
  const W=box.clientWidth||340, H=230;
  const padL=14, padR=16, padT=14, padB=24;
  const n=series.length;
  const vals=series.map(s=>s.v);
  let max=Math.max(...vals), min=Math.min(...vals);
  if(max===min){ max=max+1; min=Math.max(0,min-1); }
  const pad=(max-min)*0.18; max+=pad; min-=pad; if(min<0&&Math.min(...vals)>=0) min=0;

  const X=i=> n===1 ? W/2 : padL+(i/(n-1))*(W-padL-padR);
  const Y=v=> padT+(1-(v-min)/(max-min))*(H-padT-padB);
  const pts=series.map((s,i)=>({x:X(i),y:Y(s.v),v:s.v,ym:s.ym}));

  const linePath=smooth(pts);
  const areaPath=n>1 ? linePath+` L ${pts[n-1].x} ${H-padB} L ${pts[0].x} ${H-padB} Z` : '';

  // グリッド線（3本）
  let grid='';
  for(let g=0; g<=2; g++){
    const gy=padT+(g/2)*(H-padT-padB);
    grid+=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;
  }

  const dots=pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="${n>1?3:5}" fill="#0d1117" stroke="#3dd7c9" stroke-width="2.2"/>`).join('');

  const svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" id="chart-svg">
    <defs>
      <linearGradient id="stroke-g" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#3dd7c9"/><stop offset="1" stop-color="#5aa9ff"/>
      </linearGradient>
      <linearGradient id="area-g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="rgba(61,215,201,.30)"/>
        <stop offset="1" stop-color="rgba(61,215,201,0)"/>
      </linearGradient>
    </defs>
    ${grid}
    ${areaPath?`<path d="${areaPath}" fill="url(#area-g)"/>`:''}
    ${n>1?`<path d="${linePath}" fill="none" stroke="url(#stroke-g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" id="line-p"/>`:''}
    ${dots}
    <circle id="hi-dot" cx="0" cy="0" r="6" fill="#3dd7c9" stroke="#0a0c10" stroke-width="3" style="opacity:0"/>
  </svg>`;

  const scrub=document.getElementById('scrub');
  box.innerHTML=svg;
  box.appendChild(scrub);

  // 線のドロー・イン
  const lp=document.getElementById('line-p');
  if(lp){ const len=lp.getTotalLength(); lp.style.strokeDasharray=len; lp.style.strokeDashoffset=len;
    requestAnimationFrame(()=>{ lp.style.transition='stroke-dashoffset .7s ease'; lp.style.strokeDashoffset=0; }); }

  // スクラブ操作
  const curVal=document.getElementById('cur-val');
  const curMonth=document.getElementById('cur-month');
  const hiDot=document.getElementById('hi-dot');
  const last=pts[pts.length-1];
  const showAt=(p)=>{
    const ratio = box.clientWidth / W;
    const px=p.x*ratio;
    scrub.style.left=px+'px';
    scrub.style.height=(H*ratio-16)+'px';
    scrub.style.opacity='1';
    hiDot.setAttribute('cx',p.x); hiDot.setAttribute('cy',p.y); hiDot.style.opacity='1';
    const vp=yenParts(p.v);
    curVal.innerHTML=`<span class="yen">${vp.yen}</span>${vp.num}`;
    const [yy,mm]=p.ym.split('-');
    curMonth.textContent=`${yy}年${Number(mm)}月`;
  };
  const reset=()=>{
    scrub.style.opacity='0'; hiDot.style.opacity='0';
    const vp=yenParts(last.v); curVal.innerHTML=`<span class="yen">${vp.yen}</span>${vp.num}`;
    const [yy,mm]=last.ym.split('-'); curMonth.textContent=`${yy}年${Number(mm)}月`;
  };
  const handle=(clientX)=>{
    const rect=box.getBoundingClientRect();
    const rx=(clientX-rect.left)/ (box.clientWidth/W); // SVG座標へ
    let best=pts[0],bd=1e9;
    pts.forEach(p=>{const d=Math.abs(p.x-rx); if(d<bd){bd=d;best=p;}});
    showAt(best);
  };
  box.ontouchstart=e=>{ handle(e.touches[0].clientX); };
  box.ontouchmove =e=>{ handle(e.touches[0].clientX); };
  box.ontouchend  =reset;
  box.onmousedown =e=>handle(e.clientX);

  // X軸ラベル（最大5つ）
  const xl=document.getElementById('xlabels');
  const labelIdx=[];
  const step=Math.max(1,Math.ceil(n/5));
  for(let i=0;i<n;i+=step) labelIdx.push(i);
  if(labelIdx[labelIdx.length-1]!==n-1) labelIdx.push(n-1);
  xl.innerHTML=labelIdx.map(i=>{const [y,m]=series[i].ym.split('-');return `<span>${y.slice(2)}/${Number(m)}</span>`;}).join('');
}

function smooth(pts){
  if(pts.length<2) return '';
  let d=`M ${pts[0].x} ${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
  }
  return d;
}

/* ---- 年度別 ---- */
function renderYear(){
  const body=document.getElementById('year-body');
  const seg=`<div class="seg">
    <button data-y="nendo" class="${yearMode==='nendo'?'on':''}">年度（4月〜）</button>
    <button data-y="calendar" class="${yearMode==='calendar'?'on':''}">暦年（1月〜）</button>
  </div>`;

  if(DATA.length===0){
    body.innerHTML=seg+`<div class="empty"><div class="e-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2.5"/><path d="M4 10h16M9 3v4M15 3v4"/></svg></div><h3>データがありません</h3><p>明細を追加すると、年度ごとの合計が表示されます。</p></div>`;
    bindYearSeg(); return;
  }

  const groups={};
  DATA.forEach(d=>{
    const k=yearKeyOf(d.ym);
    if(!groups[k]) groups[k]={net:0,gross:0,ded:0,count:0};
    groups[k].net+=d.net||0; groups[k].gross+=d.gross||0; groups[k].ded+=d.ded||0; groups[k].count++;
  });
  const keys=Object.keys(groups).sort((a,b)=>b-a);

  body.innerHTML=seg+keys.map(k=>{
    const g=groups[k];
    const np=yenParts(g.net);
    return `<div class="year-card">
      <div class="year-top">
        <div><div class="year-name">${yearTitle(k)}</div><div class="year-range">${yearRange(k)}</div></div>
        <div class="year-count">${g.count}か月</div>
      </div>
      <div class="year-net">
        <div class="lbl">手取り合計</div>
        <div class="v tnum"><span class="yen">${np.yen}</span>${np.num}</div>
      </div>
      <div class="year-sub">
        <div class="it"><div class="lbl">総支給</div><div class="v tnum"><span class="yen">¥</span>${(g.gross).toLocaleString('ja-JP')}</div></div>
        <div class="it"><div class="lbl">控除</div><div class="v tnum"><span class="yen">¥</span>${(g.ded).toLocaleString('ja-JP')}</div></div>
        <div class="it"><div class="lbl">月平均(手取り)</div><div class="v tnum"><span class="yen">¥</span>${Math.round(g.net/g.count).toLocaleString('ja-JP')}</div></div>
      </div>
    </div>`;
  }).join('');
  bindYearSeg();
}
function bindYearSeg(){
  document.querySelectorAll('[data-y]').forEach(b=> b.onclick=()=>{yearMode=b.dataset.y; renderYear();});
}

/* =========================================================
   タブ切替
   ========================================================= */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    const id=t.dataset.tab;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('v-'+id).classList.add('active');
    if(id==='trend') drawCurrentTrend();
    window.scrollTo(0,0);
  };
});
function drawCurrentTrend(){ const s=sorted().map(d=>({ym:d.ym,v:val(d,metric)})); if(s.length) drawChart(s); }
window.addEventListener('resize',()=>{ if(document.getElementById('v-trend').classList.contains('active')) drawCurrentTrend(); });

/* =========================================================
   シート開閉
   ========================================================= */
const scrim=document.getElementById('scrim');
function openSheet(id){ scrim.classList.add('show'); document.getElementById(id).classList.add('show'); }
function closeSheets(){
  scrim.classList.remove('show');
  ['sheet-add','sheet-form','sheet-set'].forEach(s=>document.getElementById(s).classList.remove('show'));
}
scrim.onclick=closeSheets;
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeSheets);

/* 追加メニュー */
function openAdd(){ openSheet('sheet-add'); }
document.getElementById('fab').onclick=openAdd;
document.getElementById('opt-manual').onclick=()=>{ closeSheets(); setTimeout(()=>openForm(null),260); };
document.getElementById('opt-scan').onclick=()=>{ document.getElementById('file-img').click(); };

/* 設定 */
document.getElementById('settings-btn').onclick=()=>openSheet('sheet-set');

/* =========================================================
   入力フォーム
   ========================================================= */
const fYm=document.getElementById('f-ym'), fCo=document.getElementById('f-co'),
      fGross=document.getElementById('f-gross'), fDed=document.getElementById('f-ded'),
      fNet=document.getElementById('f-net'), fMemo=document.getElementById('f-memo');
const netHint=document.getElementById('net-hint');

function num(v){ return parseInt(String(v).replace(/[^0-9]/g,''),10)||0; }
function fmtAmt(el){ const n=num(el.value); el.value = n? n.toLocaleString('ja-JP') : ''; }
[fGross,fDed,fNet].forEach(el=> el.addEventListener('input',()=>{ const c=el.selectionStart; fmtAmt(el); updateNetHint(); }));

function updateNetHint(){
  const g=num(fGross.value), dd=num(fDed.value);
  if(g&&dd){ const sug=g-dd; netHint.innerHTML=`総支給−控除 = <b>${yen(sug)}</b>　<span style="color:#5aa9ff;text-decoration:underline" id="apply-net">これを使う</span>`;
    const a=document.getElementById('apply-net'); if(a) a.onclick=()=>{ fNet.value=sug.toLocaleString('ja-JP'); netHint.innerHTML=''; };
  } else netHint.innerHTML='';
}

function openForm(id, prefill){
  editingId=id;
  document.getElementById('form-title').textContent = id? '明細を編集' : '明細を追加';
  document.getElementById('form-delete').style.display = id? 'block':'none';
  document.getElementById('form-spacer').style.display = id? 'none':'block';
  netHint.innerHTML='';
  if(id){
    const d=DATA.find(x=>x.id===id);
    fYm.value=d.ym; fCo.value=d.co||''; fMemo.value=d.memo||'';
    fGross.value=d.gross?d.gross.toLocaleString('ja-JP'):'';
    fDed.value=d.ded?d.ded.toLocaleString('ja-JP'):'';
    fNet.value=d.net?d.net.toLocaleString('ja-JP'):'';
  } else {
    const now=new Date();
    fYm.value = prefill&&prefill.ym ? prefill.ym : `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    fCo.value=''; fMemo.value='';
    fGross.value = prefill&&prefill.gross ? prefill.gross.toLocaleString('ja-JP'):'';
    fDed.value   = prefill&&prefill.ded   ? prefill.ded.toLocaleString('ja-JP'):'';
    fNet.value   = prefill&&prefill.net   ? prefill.net.toLocaleString('ja-JP'):'';
    updateNetHint();
  }
  openSheet('sheet-form');
}
function openEdit(id){ openForm(id); }

document.getElementById('form-cancel').onclick=closeSheets;
document.getElementById('form-save').onclick=()=>{
  const ym=fYm.value;
  if(!ym){ toast('年月を選んでください'); return; }
  const g=num(fGross.value), dd=num(fDed.value), nt=num(fNet.value);
  if(!g&&!dd&&!nt){ toast('金額を入力してください'); return; }
  const rec={ id:editingId||('p'+Date.now()), ym, co:fCo.value.trim(), gross:g, ded:dd, net:nt, memo:fMemo.value.trim() };
  if(editingId){ const i=DATA.findIndex(x=>x.id===editingId); DATA[i]=rec; }
  else DATA.push(rec);
  save(); render(); closeSheets();
  toast(editingId?'更新しました':'保存しました');
  editingId=null;
};
document.getElementById('form-delete').onclick=()=>{
  if(!editingId) return;
  if(confirm('この明細を削除しますか？')){
    DATA=DATA.filter(x=>x.id!==editingId);
    save(); render(); closeSheets(); toast('削除しました'); editingId=null;
  }
};

/* =========================================================
   スキャン（OCR）
   ========================================================= */
const z2h = s => s
  .replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0))
  .replace(/，/g,',').replace(/￥/g,'¥').replace(/　/g,' ');

function findNum(line){
  const m=z2h(line).match(/(\d{1,3}(?:,\d{3})+|\d{4,})/g);
  if(!m) return null;
  let best=null;
  m.forEach(x=>{const v=parseInt(x.replace(/[^0-9]/g,''),10); if(v>=1000&&(best===null||v>best))best=v;});
  return best;
}
function parseSlip(text){
  const out={gross:null,ded:null,net:null,ym:null};
  const lines=text.split(/\n/);
  lines.forEach(line=>{
    const l=z2h(line);
    if(out.net===null && /(差引支給|差引|振込|銀行振込|手取)/.test(l)) out.net=findNum(l)??out.net;
    if(out.gross===null && /(総支給|支給額合計|支給合計|支給計|課税支給)/.test(l)) out.gross=findNum(l)??out.gross;
    if(out.ded===null && /(控除合計|控除額合計|控除計|控除額)/.test(l)) out.ded=findNum(l)??out.ded;
  });
  // 年月
  const t=z2h(text);
  let m=t.match(/(20\d{2})\s*[年\/\.\-]\s*(1[0-2]|0?[1-9])/);
  if(m) out.ym=m[1]+'-'+String(m[2]).padStart(2,'0');
  else{
    m=t.match(/令和\s*(元|\d{1,2})\s*年\s*(1[0-2]|0?[1-9])\s*月/);
    if(m){ const r=m[1]==='元'?1:parseInt(m[1],10); out.ym=(2018+r)+'-'+String(m[2]).padStart(2,'0'); }
  }
  return out;
}

document.getElementById('file-img').addEventListener('change',async e=>{
  const file=e.target.files[0]; e.target.value='';
  if(!file) return;
  closeSheets();
  const ov=document.getElementById('ocr'), bar=document.getElementById('ocr-bar');
  bar.style.width='0%'; ov.classList.add('show');
  try{
    if(typeof Tesseract==='undefined') throw new Error('no-lib');
    const worker=await Tesseract.createWorker('jpn+eng',1,{
      logger:m=>{ if(m.status==='recognizing text') bar.style.width=Math.round(m.progress*100)+'%'; }
    });
    const {data:{text}}=await worker.recognize(file);
    await worker.terminate();
    ov.classList.remove('show');
    const r=parseSlip(text);
    if(!r.gross&&!r.ded&&!r.net){
      toast('金額を読み取れませんでした。手入力してください');
      setTimeout(()=>openForm(null,r),200);
    }else{
      toast('読み取りました。内容を確認してください');
      setTimeout(()=>openForm(null,r),200);
    }
  }catch(err){
    ov.classList.remove('show');
    if(String(err.message).includes('no-lib'))
      toast('読み取り機能を読み込めませんでした（通信環境をご確認ください）');
    else toast('読み取りに失敗しました。手入力してください');
    setTimeout(()=>openForm(null,null),200);
  }
});

/* =========================================================
   バックアップ
   ========================================================= */
document.getElementById('set-export').onclick=()=>{
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const today=new Date().toISOString().slice(0,10);
  a.href=url; a.download=`給与明細_backup_${today}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  closeSheets(); toast('バックアップを書き出しました');
};
document.getElementById('set-import').onclick=()=>document.getElementById('file-json').click();
document.getElementById('file-json').addEventListener('change',e=>{
  const file=e.target.files[0]; e.target.value=''; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const arr=JSON.parse(rd.result);
      if(!Array.isArray(arr)) throw 0;
      const map={}; [...DATA,...arr].forEach(d=>{ if(d&&d.ym) map[d.id||('p'+d.ym+Math.random())]=d; });
      DATA=Object.values(map).map(d=>({id:d.id||('p'+Date.now()+Math.random()),ym:d.ym,co:d.co||'',gross:d.gross||0,ded:d.ded||0,net:d.net||0,memo:d.memo||''}));
      save(); render(); closeSheets(); toast(`取り込みました（${arr.length}件）`);
    }catch(err){ toast('ファイルを読み込めませんでした'); }
  };
  rd.readAsText(file);
});
document.getElementById('set-clear').onclick=()=>{
  if(confirm('すべての明細を削除します。よろしいですか？')){
    DATA=[]; save(); render(); closeSheets(); toast('すべて削除しました');
  }
};

/* =========================================================
   ユーティリティ
   ========================================================= */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* 起動 */
load(); render();
