<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3dd7c9"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(61,215,201,0.35)"/>
      <stop offset="100%" stop-color="rgba(61,215,201,0)"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- グラフエリア -->
  <path d="M 80 360 L 80 280 C 130 280 150 240 180 200 C 210 160 230 130 280 110 C 330 90 380 120 430 100 L 430 360 Z" fill="url(#area)"/>
  <!-- グラフライン -->
  <path d="M 80 280 C 130 280 150 240 180 200 C 210 160 230 130 280 110 C 330 90 380 120 430 100" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ドット（最高点） -->
  <circle cx="430" cy="100" r="14" fill="#3dd7c9" stroke="#080b12" stroke-width="5"/>
  <!-- ¥バッジ -->
  <circle cx="140" cy="390" r="68" fill="rgba(61,215,201,0.12)"/>
  <text x="140" y="408" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="url(#accent)">¥</text>
</svg>
