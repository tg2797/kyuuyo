<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="100%" stop-color="#12182a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3dd7c9"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="wallet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2840"/>
      <stop offset="100%" stop-color="#141a2e"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- 財布ボディ -->
  <rect x="70" y="160" width="370" height="230" rx="30" fill="url(#wallet)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- 財布フラップ（上部のカーブ） -->
  <rect x="70" y="160" width="370" height="55" rx="30" fill="rgba(61,215,201,0.18)"/>
  <rect x="70" y="190" width="370" height="25" fill="rgba(61,215,201,0.18)"/>
  <!-- コインポケット -->
  <rect x="310" y="220" width="110" height="90" rx="18" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- コイン -->
  <circle cx="365" cy="265" r="30" fill="none" stroke="url(#accent)" stroke-width="5"/>
  <text x="365" y="275" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="url(#accent)">¥</text>
  <!-- ラインカード風 -->
  <rect x="100" y="230" width="180" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
  <rect x="100" y="258" width="120" height="10" rx="5" fill="rgba(255,255,255,0.1)"/>
  <!-- ストライプ -->
  <rect x="70" y="162" width="370" height="6" rx="3" fill="url(#accent)" opacity="0.9"/>
</svg>
